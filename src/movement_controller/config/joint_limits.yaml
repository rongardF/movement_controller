# These limits are used by MoveIt and augment/override the definitions in ur_description.
#
# While the robot does not inherently have any limits on joint accelerations (only on torques),
# MoveIt needs them for time parametrization. They were chosen conservatively to work in most use
# cases. For specific applications, higher values might lead to better execution performance.

# Read more about setting joint limits at: https://moveit.picknik.ai/main/doc/how_to_guides/pilz_industrial_motion_planner/pilz_industrial_motion_planner.html
# - Limits set here will only be used if they are more restrictive than the limits set in the URDF
# - The strictest combination of limits will be used as COMMON limit for ALL joints

joint_limits:
  # region: UR joint limits
  shoulder_pan_joint:
    has_acceleration_limits: true
    max_acceleration: 3.75
    has_velocity_limits: true
    max_velocity: 1.57
  shoulder_lift_joint:
    has_acceleration_limits: true
    max_acceleration: 3.75
    has_velocity_limits: true
    max_velocity: 1.57
  elbow_joint:
    has_acceleration_limits: true
    max_acceleration: 3.75
    has_velocity_limits: true
    max_velocity: 1.57
  wrist_1_joint:
    has_acceleration_limits: true
    max_acceleration: 3.75
    has_velocity_limits: true
    max_velocity: 1.57
  wrist_2_joint:
    has_acceleration_limits: true
    max_acceleration: 3.75
    has_velocity_limits: true
    max_velocity: 1.57
  wrist_3_joint:
    has_acceleration_limits: true
    max_acceleration: 3.75
    has_velocity_limits: true
    max_velocity: 1.57
  # endregion: UR joint limits